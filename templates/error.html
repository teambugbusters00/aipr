<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - AI PR Reviewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #fee;
        }
        .error {
            background: white;
            padding: 30px;
            border-radius: 8px;
            border-left: 4px solid red;
        }
        a { color: #0066cc; }
    </style>
</head>
<body>
    <div class="error">
        <h1>⚠️ Error</h1>
        <p>{{ error }}</p>
        <p><a href="/">Go back to home</a></p>
    </div>
</body>
</html>
